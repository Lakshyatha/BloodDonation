# Supabase PostgreSQL Database (Transaction Pooler - Port 6543)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://aws-1-ap-southeast-2.pooler.supabase.com:6543/postgres?sslmode=require}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres.dvyxnxcqilawsekviukd}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Lux@3015pcb}
spring.datasource.driverClassName=org.postgresql.Driver

# Hikari Connection Pool Settings (Ultra-Resilient)
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.idle-timeout=10000
spring.datasource.hikari.max-lifetime=1800000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

# Server port (Production uses internal 8080)
server.port=${SERVER_PORT:8080}

# CORS
spring.web.cors.enabled=true