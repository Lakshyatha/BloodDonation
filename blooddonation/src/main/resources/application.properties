# Supabase PostgreSQL Database (Optimized for Render + Supavisor)
# prepareThreshold=0 is CRITICAL for Supabase Pooler compatibility
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://aws-1-ap-southeast-2.pooler.supabase.com:6543/postgres?sslmode=require&prepareThreshold=0}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres.dvyxnxcqilawsekviukd}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Lux@3015pcb}
spring.datasource.driverClassName=org.postgresql.Driver

# Hikari Connection Pool Settings (Heavy-Duty for Cross-Region Latency)
spring.datasource.hikari.connection-timeout=90000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.idle-timeout=10000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.keepalive-time=30000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Force PostgreSQL dialect to avoid metadata/connection hanging during resolution
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

# Server port (Production uses internal 8080)
server.port=${SERVER_PORT:8080}

# CORS
spring.web.cors.enabled=true